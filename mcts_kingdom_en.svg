<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1b1430"/>
      <stop offset="100%" stop-color="#0a0714"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d976"/>
      <stop offset="100%" stop-color="#c98f1f"/>
    </linearGradient>
    <linearGradient id="strongDynasty" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7a7a"/>
      <stop offset="100%" stop-color="#b3201f"/>
    </linearGradient>
    <linearGradient id="weak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8aa8"/>
      <stop offset="100%" stop-color="#3c4a63"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="720" fill="url(#bg)"/>

  <text x="500" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f6d976" font-weight="bold">Monte Carlo Tree Search Kingdom</text>

  <!-- Tree edges -->
  <g stroke="#5a4a7a" stroke-width="2" fill="none">
    <line x1="500" y1="110" x2="280" y2="220"/>
    <line x1="500" y1="110" x2="500" y2="220"/>
    <line x1="500" y1="110" x2="720" y2="220"/>

    <line x1="280" y1="260" x2="180" y2="370"/>
    <line x1="280" y1="260" x2="320" y2="370"/>

    <line x1="320" y1="410" x2="260" y2="510"/>
    <line x1="320" y1="410" x2="380" y2="510"/>

    <line x1="380" y1="550" x2="380" y2="610" stroke-dasharray="4 4"/>
  </g>

  <!-- Capital (root) -->
  <g>
    <circle cx="500" cy="90" r="40" fill="url(#gold)" stroke="#fff3c4" stroke-width="2"/>
    <text x="500" y="86" text-anchor="middle" font-family="Georgia" font-size="13" fill="#3a2a00" font-weight="bold">Capital</text>
    <text x="500" y="100" text-anchor="middle" font-family="Georgia" font-size="11" fill="#3a2a00">King</text>
  </g>

  <!-- Children of root -->
  <g>
    <circle cx="280" cy="240" r="32" fill="url(#strongDynasty)" stroke="#fff" stroke-width="2"/>
    <text x="280" y="237" text-anchor="middle" font-family="Georgia" font-size="11" fill="#fff" font-weight="bold">Dynasty A</text>
    <text x="280" y="250" text-anchor="middle" font-family="Georgia" font-size="9" fill="#fdf">v=240 w=190</text>
  </g>
  <g>
    <circle cx="500" cy="240" r="28" fill="url(#weak)" stroke="#cfd8e8" stroke-width="2"/>
    <text x="500" y="237" text-anchor="middle" font-family="Georgia" font-size="11" fill="#fff">Dynasty B</text>
    <text x="500" y="250" text-anchor="middle" font-family="Georgia" font-size="9" fill="#dfe6f0">v=80 w=20</text>
  </g>
  <g>
    <circle cx="720" cy="240" r="26" fill="url(#weak)" stroke="#cfd8e8" stroke-width="2"/>
    <text x="720" y="237" text-anchor="middle" font-family="Georgia" font-size="11" fill="#fff">Dynasty C</text>
    <text x="720" y="250" text-anchor="middle" font-family="Georgia" font-size="9" fill="#dfe6f0">v=40 w=8</text>
  </g>

  <!-- grandchildren under A -->
  <g>
    <circle cx="180" cy="390" r="26" fill="url(#weak)" stroke="#cfd8e8" stroke-width="2"/>
    <text x="180" y="387" text-anchor="middle" font-family="Georgia" font-size="10" fill="#fff">child</text>
    <text x="180" y="399" text-anchor="middle" font-family="Georgia" font-size="9" fill="#dfe6f0">v=60 w=30</text>
  </g>
  <g>
    <circle cx="320" cy="390" r="30" fill="url(#strongDynasty)" stroke="#fff" stroke-width="2"/>
    <text x="320" y="387" text-anchor="middle" font-family="Georgia" font-size="10" fill="#fff" font-weight="bold">child*</text>
    <text x="320" y="399" text-anchor="middle" font-family="Georgia" font-size="9" fill="#fdf">v=180 w=160</text>
  </g>

  <!-- great-grandchildren -->
  <g>
    <circle cx="260" cy="530" r="22" fill="url(#weak)" stroke="#cfd8e8" stroke-width="2"/>
    <text x="260" y="534" text-anchor="middle" font-family="Georgia" font-size="9" fill="#fff">v=20 w=9</text>
  </g>
  <g>
    <circle cx="380" cy="530" r="26" fill="url(#strongDynasty)" stroke="#fff" stroke-width="2"/>
    <text x="380" y="525" text-anchor="middle" font-family="Georgia" font-size="9" fill="#fff" font-weight="bold">unknown</text>
    <text x="380" y="538" text-anchor="middle" font-family="Georgia" font-size="9" fill="#fdf">v=1 w=?</text>
  </g>

  <!-- new child being baked -->
  <g>
    <circle cx="380" cy="610" r="20" fill="none" stroke="#f6d976" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="380" y="608" text-anchor="middle" font-family="Georgia" font-size="9" fill="#f6d976">new</text>
    <text x="380" y="619" text-anchor="middle" font-family="Georgia" font-size="9" fill="#f6d976">child</text>
  </g>

  <!-- Adventurer wandering -->
  <g>
    <circle cx="450" cy="660" r="10" fill="#e8c873"/>
    <line x1="450" y1="670" x2="450" y2="690" stroke="#e8c873" stroke-width="3"/>
    <line x1="450" y1="675" x2="435" y2="685" stroke="#e8c873" stroke-width="3"/>
    <line x1="450" y1="675" x2="465" y2="685" stroke="#e8c873" stroke-width="3"/>
    <line x1="450" y1="690" x2="438" y2="705" stroke="#e8c873" stroke-width="3"/>
    <line x1="450" y1="690" x2="462" y2="705" stroke="#e8c873" stroke-width="3"/>
    <path d="M380,630 Q420,650 450,660" stroke="#e8c873" stroke-width="1.5" fill="none" stroke-dasharray="2 4"/>
  </g>

  <!-- Legend -->
  <g font-family="Georgia, serif" font-size="13" fill="#e8e3f5">
    <circle cx="60" cy="660" r="10" fill="url(#strongDynasty)"/>
    <text x="78" y="665">Strong dynasty (many wins)</text>

    <circle cx="60" cy="688" r="10" fill="url(#weak)"/>
    <text x="78" y="693">Weaker / less explored branch</text>

    <circle cx="500" cy="660" r="10" fill="none" stroke="#f6d976" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="518" y="665" fill="#f6d976">Newly born child (expansion)</text>
  </g>

  <text x="500" y="700" text-anchor="middle" font-family="Georgia" font-size="14" fill="#aaa0c8" font-style="italic">
    Selection → Expansion → Simulation (wanderer) → Backpropagation
  </text>
</svg>
